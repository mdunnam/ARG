<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex, nofollow, noarchive" />
<title>Somnatek — Internal Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d0d0d;
  color: #c8c8c8;
  font-family: "Courier New", Courier, monospace;
  font-size: 13px;
  line-height: 1.5;
}

#auth-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

#auth-box {
  border: 1px solid #333;
  padding: 32px 40px;
  width: 340px;
  background: #111;
}

#auth-box h1 {
  font-size: 14px;
  letter-spacing: 0.1em;
  color: #888;
  margin-bottom: 20px;
  text-transform: uppercase;
}

#auth-box label {
  display: block;
  color: #666;
  font-size: 11px;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

#auth-box input[type="password"] {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #c8c8c8;
  font-family: "Courier New", Courier, monospace;
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  margin-bottom: 16px;
}

#auth-box input[type="password"]:focus { border-color: #555; }

#auth-box button {
  width: 100%;
  background: #1e1e1e;
  border: 1px solid #444;
  color: #aaa;
  font-family: "Courier New", Courier, monospace;
  font-size: 12px;
  padding: 8px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

#auth-box button:hover { background: #252525; border-color: #555; }
#auth-error { color: #7a3030; font-size: 11px; margin-top: 8px; min-height: 16px; }

/* ---- Dashboard ---- */
#dashboard { display: none; }

#topbar {
  background: #111;
  border-bottom: 1px solid #222;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#topbar .title { color: #666; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
#topbar .right { display: flex; gap: 16px; align-items: center; }
#topbar .refresh-btn {
  background: none; border: 1px solid #333; color: #666;
  font-family: "Courier New", Courier, monospace; font-size: 11px;
  padding: 4px 10px; cursor: pointer; text-transform: uppercase;
  letter-spacing: 0.08em;
}
#topbar .refresh-btn:hover { border-color: #555; color: #aaa; }
#last-updated { color: #444; font-size: 11px; }

#tabs {
  display: flex;
  background: #0f0f0f;
  border-bottom: 1px solid #222;
  padding: 0 20px;
}

.tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: #555;
  font-family: "Courier New", Courier, monospace;
  font-size: 11px;
  padding: 10px 16px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.tab:hover { color: #888; }
.tab.active { color: #aaa; border-bottom-color: #555; }

#content { padding: 24px 20px; }

.panel { display: none; }
.panel.active { display: block; }

/* ---- Stat cards ---- */
.stat-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }

.stat-card {
  background: #111;
  border: 1px solid #222;
  padding: 16px 20px;
  min-width: 160px;
  flex: 1;
}

.stat-card .label {
  color: #555;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.stat-card .value {
  color: #d0d0d0;
  font-size: 22px;
  font-weight: normal;
}

.stat-card .sub { color: #555; font-size: 10px; margin-top: 4px; }

/* ---- Tables ---- */
.section-title {
  color: #555;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
  border-bottom: 1px solid #1e1e1e;
  padding-bottom: 6px;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th {
  text-align: left;
  color: #555;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 6px 10px;
  border-bottom: 1px solid #222;
  font-weight: normal;
}

.data-table td {
  padding: 6px 10px;
  color: #aaa;
  border-bottom: 1px solid #1a1a1a;
}

.data-table tr:hover td { background: #141414; }

.badge {
  display: inline-block;
  padding: 1px 7px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-radius: 2px;
}

.badge-intake   { background: #1a2a1a; color: #5a8a5a; border: 1px solid #2a3a2a; }
.badge-unknown  { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }
.badge-active   { background: #1a1e2a; color: #5a6a9a; border: 1px solid #2a2e3a; }
.badge-pending  { background: #2a2a1a; color: #9a9a5a; border: 1px solid #3a3a2a; }
.badge-recalled { background: #2a1a1a; color: #9a5a5a; border: 1px solid #3a2a2a; }

/* ---- Cost bar ---- */
.cost-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  gap: 12px;
}

.cost-row .svc { color: #888; font-size: 11px; min-width: 200px; }
.cost-bar-track { flex: 1; height: 6px; background: #1a1a1a; border-radius: 2px; }
.cost-bar-fill  { height: 100%; background: #3a5a3a; border-radius: 2px; transition: width 0.3s; }
.cost-row .amt  { color: #aaa; font-size: 11px; min-width: 60px; text-align: right; }

/* ---- Progress bars ---- */
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.progress-label { color: #888; font-size: 11px; min-width: 200px; }
.progress-track { flex: 1; height: 5px; background: #1a1a1a; border-radius: 2px; }
.progress-fill  { height: 100%; border-radius: 2px; transition: width 0.3s; }
.progress-fill-released  { background: #3a5a5a; }
.progress-fill-unreleased { background: #2a2a2a; }
.progress-pct { color: #666; font-size: 11px; min-width: 36px; text-align: right; }
.milestone-badge { display:inline-block; padding:1px 6px; font-size:10px; border-radius:2px; margin-right:3px; }
.ms-done    { background:#1a2a1a; color:#5a8a5a; border:1px solid #2a3a2a; }
.ms-pending { background:#1a1a1a; color:#444;    border:1px solid #222; }
.pages-list { color:#555; font-size:10px; }

/* ---- Sitemap panel ---- */
.sitemap-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: flex-start;
}
.sitemap-group {
  background: #111;
  border: 1px solid #222;
  padding: 14px 18px;
  min-width: 220px;
  flex: 1;
}
.sitemap-group-title {
  color: #555;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #1e1e1e;
}
.sitemap-link {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 3px 0;
  text-decoration: none;
  font-size: 12px;
  line-height: 1.5;
  color: #7a9ab8;
}
.sitemap-link:hover { color: #aac8e0; }
.sitemap-link .sl-label { flex: 1; }
.sitemap-link .sl-note {
  color: #3a3a3a;
  font-size: 10px;
  flex-shrink: 0;
}
.sitemap-link .sl-tag {
  font-size: 9px;
  padding: 0px 5px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}
.tag-hidden   { background: #1e1e2a; color: #5a5a9a; border: 1px solid #2a2a3a; }
.tag-puzzle   { background: #1e2a1e; color: #5a8a5a; border: 1px solid #2a3a2a; }
.tag-archive  { background: #2a1e1e; color: #8a5a5a; border: 1px solid #3a2a2a; }
.tag-real     { background: #2a2a1e; color: #8a8a5a; border: 1px solid #3a3a2a; }
.tag-pdf      { background: #1e2a2a; color: #5a8a8a; border: 1px solid #2a3a3a; }
.tag-pending  { background: #2a2010; color: #8a7040; border: 1px solid #3a3020; }

/* ---- Loading / error ---- */
.loading { color: #444; font-size: 12px; padding: 40px 0; }
.error-msg { color: #7a3030; font-size: 12px; padding: 20px 0; }

/* ---- Pagination ---- */
#visitors-pager { margin-top: 12px; display: flex; gap: 8px; }
#visitors-pager button {
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #666;
  font-family: "Courier New", Courier, monospace; font-size: 11px;
  padding: 4px 12px; cursor: pointer;
}
#visitors-pager button:hover:not(:disabled) { border-color: #444; color: #aaa; }
#visitors-pager button:disabled { opacity: 0.3; cursor: default; }
#visitors-page-info { color: #444; font-size: 11px; line-height: 28px; }
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <div id="auth-box">
    <h1>Somnatek Internal</h1>
    <label for="token-input">Access token</label>
    <input type="password" id="token-input" autocomplete="off" spellcheck="false" />
    <button id="auth-btn">Authenticate</button>
    <div id="auth-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div id="topbar">
    <span class="title">Somnatek ARG &mdash; Internal Dashboard</span>
    <div class="right">
      <span id="last-updated"></span>
      <button class="refresh-btn" id="refresh-btn">Refresh</button>
      <button class="refresh-btn" id="logout-btn">Log out</button>
    </div>
  </div>

  <div id="tabs">
    <button class="tab active" data-panel="visitors">Visitors</button>
    <button class="tab" data-panel="beacons">Beacons</button>
    <button class="tab" data-panel="metrics">Lambda</button>
    <button class="tab" data-panel="costs">AWS Costs</button>
    <button class="tab" data-panel="sitemap">Sitemap</button>
  </div>

  <div id="content">
    <!-- Visitors panel -->
    <div id="panel-visitors" class="panel active">
      <div id="visitors-stats" class="stat-row"></div>
      <div class="section-title">Milestone Distribution</div>
      <div id="milestone-dist-wrap"></div>
      <div style="margin-top:24px" class="section-title">Named Visitor Records</div>
      <div id="visitors-table-wrap"><div class="loading">Loading&hellip;</div></div>
      <div id="visitors-pager">
        <button id="pager-prev" disabled>&laquo; Prev</button>
        <span id="visitors-page-info"></span>
        <button id="pager-next" disabled>Next &raquo;</button>
      </div>
    </div>

    <!-- Beacons / anonymous visitors panel -->
    <div id="panel-beacons" class="panel">
      <div id="beacons-stats" class="stat-row"></div>
      <div class="section-title">Page View Counts</div>
      <div id="page-view-wrap"></div>
      <div style="margin-top:24px" class="section-title">Top Referrers</div>
      <div id="referrer-wrap"></div>
      <div style="margin-top:24px" class="section-title">Anonymous Visitor Records</div>
      <div id="anon-table-wrap"><div class="loading">Loading&hellip;</div></div>
    </div>

    <!-- Lambda metrics panel -->
    <div id="panel-metrics" class="panel">
      <div id="metrics-stats" class="stat-row"></div>
      <div class="section-title">Daily Invocations (30 days)</div>
      <div id="metrics-table-wrap"><div class="loading">Loading&hellip;</div></div>
    </div>

    <!-- Costs panel -->
    <div id="panel-costs" class="panel">
      <div id="costs-stats" class="stat-row"></div>
      <div class="section-title">Month-to-Date by Service</div>
      <div id="costs-bars-wrap"><div class="loading">Loading&hellip;</div></div>
    </div>

    <!-- Sitemap panel -->
    <div id="panel-sitemap" class="panel">
      <div class="sitemap-grid" id="sitemap-grid"></div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var ADMIN_API   = '/api/admin';
  var STORAGE_KEY  = 'sntk_admin_tok';
  var PAGE_SIZE    = 50;

  var token = '';
  var data  = null;
  var currentPage = 0;

  // ---- Auth ----

  document.getElementById('token-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('auth-btn').click();
  });

  document.getElementById('auth-btn').addEventListener('click', function () {
    var t = document.getElementById('token-input').value.trim();
    if (!t) return;
    token = t;
    fetchAll();
  });

  // Auto-login if a token was saved from a previous session
  (function autoLogin() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        token = saved;
        fetchAll();
      }
    } catch (_) { /* localStorage unavailable */ }
  })();

  // ---- Tab switching ----

  document.querySelectorAll('.tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tab').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    });
  });

  document.getElementById('refresh-btn').addEventListener('click', fetchAll);

  document.getElementById('logout-btn').addEventListener('click', function () {
    token = '';
    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
    data = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display   = 'none';
    document.getElementById('token-input').value = '';
  });

  // ---- Fetch ----

  function fetchAll() {
    document.getElementById('auth-error').textContent = '';

    fetch(ADMIN_API + '?action=all', {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Token': token,
      },
    })
    .then(function (r) {
      if (r.status === 401) throw new Error('invalid_token');
      if (!r.ok) throw new Error('server_error');
      return r.json();
    })
    .then(function (d) {
      data = d;
      currentPage = 0;
      // Persist the token so the next visit skips the login screen
      try { localStorage.setItem(STORAGE_KEY, token); } catch (_) {}
      showDashboard();
      renderAll();
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    })
    .catch(function (err) {
      if (err.message === 'invalid_token') {
        token = '';
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
        document.getElementById('auth-error').textContent = 'Access denied.';
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('dashboard').style.display  = 'none';
      } else {
        document.getElementById('last-updated').textContent = 'Error loading data.';
      }
    });
  }

  function showDashboard() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display  = 'block';
  }

  // ---- Render ----

  function renderAll() {
    if (data.visitors) renderVisitors(data.visitors);
    if (data.metrics)  renderMetrics(data.metrics);
    if (data.costs)    renderCosts(data.costs);
  }

  /** @param {object} v */
  function renderVisitors(v) {
    // Stat cards
    var statsEl = document.getElementById('visitors-stats');
    statsEl.innerHTML = '';
    statsEl.appendChild(statCard('Named visitors', v.totalNamed || 0));
    statsEl.appendChild(statCard('Anonymous visitors', v.totalAnon || 0));
    var pctSolved = v.totalNamed ? Math.round((v.milestoneCounts['portal_solved'] || 0) / v.totalNamed * 100) : 0;
    statsEl.appendChild(statCard('Portal solved', (v.milestoneCounts['portal_solved'] || 0), pctSolved + '% of named'));

    // Milestone distribution
    var mdWrap = document.getElementById('milestone-dist-wrap');
    var milestones = v.milestones || [];
    var named = v.totalNamed || 0;
    var html = '';
    milestones.forEach(function (m) {
      var count = v.milestoneCounts[m.id] || 0;
      var pct   = named ? (count / named * 100) : 0;
      var relClass = m.released ? 'progress-fill-released' : 'progress-fill-unreleased';
      var label = m.label + (m.released ? '' : ' [unreleased]');
      html += '<div class="progress-row">' +
        '<span class="progress-label">' + esc(label) + '</span>' +
        '<div class="progress-track"><div class="progress-fill ' + relClass + '" style="width:' + pct.toFixed(1) + '%"></div></div>' +
        '<span class="progress-pct">' + count + '</span>' +
        '</div>';
    });
    mdWrap.innerHTML = html || '<div class="loading">No milestone data.</div>';

    // Visitor table
    renderVisitorPage(v.visitors || [], v.milestones || []);

    document.getElementById('pager-prev').onclick = function () {
      if (currentPage > 0) { currentPage--; renderVisitorPage(v.visitors || [], v.milestones || []); }
    };
    document.getElementById('pager-next').onclick = function () {
      var maxPage = Math.ceil((v.visitors || []).length / PAGE_SIZE) - 1;
      if (currentPage < maxPage) { currentPage++; renderVisitorPage(v.visitors || [], v.milestones || []); }
    };

    // Beacons panel
    var beaconsStats = document.getElementById('beacons-stats');
    beaconsStats.innerHTML = '';
    beaconsStats.appendChild(statCard('Total page views', (v.pageViewStats || []).reduce(function(s,r){return s+r.views;},0)));
    beaconsStats.appendChild(statCard('Unique referrers', (v.referrerStats || []).length));

    // Page view bars
    var pvWrap = document.getElementById('page-view-wrap');
    var pvData = v.pageViewStats || [];
    var pvMax  = pvData.length ? pvData[0].views : 1;
    html = '';
    pvData.forEach(function (row) {
      var pct = pvMax > 0 ? (row.views / pvMax * 100) : 0;
      html += '<div class="progress-row">' +
        '<span class="progress-label">' + esc(row.page) + '</span>' +
        '<div class="progress-track"><div class="progress-fill progress-fill-released" style="width:' + pct.toFixed(1) + '%"></div></div>' +
        '<span class="progress-pct">' + row.views + '</span>' +
        '</div>';
    });
    pvWrap.innerHTML = html || '<div class="loading">No page view data yet.</div>';

    // Referrers
    var refWrap = document.getElementById('referrer-wrap');
    var refData = v.referrerStats || [];
    if (!refData.length) {
      refWrap.innerHTML = '<div class="loading">No referrer data.</div>';
    } else {
      var refMax = refData[0].count;
      html = '';
      refData.forEach(function (row) {
        var pct = refMax > 0 ? (row.count / refMax * 100) : 0;
        html += '<div class="progress-row">' +
          '<span class="progress-label" style="font-size:10px">' + esc(row.ref || '(direct)') + '</span>' +
          '<div class="progress-track"><div class="progress-fill progress-fill-released" style="width:' + pct.toFixed(1) + '%"></div></div>' +
          '<span class="progress-pct">' + row.count + '</span>' +
          '</div>';
      });
      refWrap.innerHTML = html;
    }

    // Anon table
    renderAnonTable(v.anon || []);
  }

  function renderVisitorPage(visitors, milestones) {
    var total   = visitors.length;
    var maxPage = Math.max(0, Math.ceil(total / PAGE_SIZE) - 1);
    var start   = currentPage * PAGE_SIZE;
    var slice   = visitors.slice(start, start + PAGE_SIZE);

    document.getElementById('pager-prev').disabled = currentPage === 0;
    document.getElementById('pager-next').disabled = currentPage >= maxPage;
    document.getElementById('visitors-page-info').textContent =
      total ? ('Page ' + (currentPage + 1) + ' of ' + (maxPage + 1) + ' — ' + total + ' records') : 'No records';

    var wrap = document.getElementById('visitors-table-wrap');
    if (!slice.length) {
      wrap.innerHTML = '<div class="loading">No visitor records found.</div>';
      return;
    }

    var milestoneIds = (milestones || []).map(function(m){ return {id:m.id, label:m.label, released:m.released}; });

    var t = '<table class="data-table"><thead><tr>' +
      '<th>Visitor ID</th><th>%&nbsp;Complete</th><th>Level</th><th>Milestones</th>' +
      '<th>Pages</th><th>First seen</th><th>Last seen</th><th>Referrer</th>' +
      '</tr></thead><tbody>';

    slice.forEach(function (row) {
      var pct  = row.percentComplete || 0;
      var achieved = row.milestones || [];
      var achievedSet = {};
      achieved.forEach(function(m){ achievedSet[m] = true; });

      var msBadges = milestoneIds.map(function(m) {
        var done = achievedSet[m.id];
        return '<span class="milestone-badge ' + (done ? 'ms-done' : 'ms-pending') + '">' + esc(m.id.replace(/_/g,' ')) + '</span>';
      }).join('');

      var pages = (row.pagesVisited || []).slice(-6).join(' → ');
      if (row.pageViewCount > 6) pages = '… ' + pages;

      t += '<tr>' +
        '<td style="color:#d0d0d0;letter-spacing:.04em">' + esc(row.visitorId || '—') + '</td>' +
        '<td>' +
          '<div style="display:flex;align-items:center;gap:8px">' +
          '<div class="progress-track" style="width:80px"><div class="progress-fill progress-fill-released" style="width:' + pct + '%"></div></div>' +
          '<span style="color:#888;font-size:10px">' + pct + '%</span>' +
          '</div>' +
        '</td>' +
        '<td style="color:#888">' + (row.level || 1) + '</td>' +
        '<td style="line-height:1.8">' + msBadges + '</td>' +
        '<td class="pages-list">' + esc(pages || '—') + '</td>' +
        '<td style="color:#666">' + fmtDate(row.firstSeen) + '</td>' +
        '<td style="color:#666">' + fmtDate(row.lastSeen) + '</td>' +
        '<td style="color:#555;font-size:10px;max-width:160px;overflow:hidden;text-overflow:ellipsis">' + esc((row.referrer||'').slice(0,60) || '—') + '</td>' +
        '</tr>';
    });

    t += '</tbody></table>';
    wrap.innerHTML = t;
  }

  function renderAnonTable(anon) {
    var wrap = document.getElementById('anon-table-wrap');
    if (!anon.length) {
      wrap.innerHTML = '<div class="loading">No anonymous visitor records.</div>';
      return;
    }

    var t = '<table class="data-table"><thead><tr>' +
      '<th>IP prefix</th><th>Views</th><th>Pages</th><th>First seen</th><th>Last seen</th><th>Referrer</th>' +
      '</tr></thead><tbody>';

    anon.slice(0, 50).forEach(function (row) {
      var pages = (row.pagesVisited || []).slice(-5).join(' → ');
      t += '<tr>' +
        '<td style="color:#666;font-family:monospace">' + esc(row.ipPrefix || '—') + '</td>' +
        '<td style="color:#888">' + (row.pageViewCount || 0) + '</td>' +
        '<td class="pages-list">' + esc(pages || '—') + '</td>' +
        '<td style="color:#666">' + fmtDate(row.firstSeen) + '</td>' +
        '<td style="color:#666">' + fmtDate(row.lastSeen) + '</td>' +
        '<td style="color:#555;font-size:10px">' + esc((row.referrer||'').slice(0,60) || '—') + '</td>' +
        '</tr>';
    });

    if (anon.length > 50) {
      t += '<tr><td colspan="6" style="color:#444;font-size:11px">…and ' + (anon.length - 50) + ' more</td></tr>';
    }

    t += '</tbody></table>';
    wrap.innerHTML = t;
  }

  /** @param {object} m */
  function renderMetrics(m) {
    var statsEl = document.getElementById('metrics-stats');
    statsEl.innerHTML = '';
    var portal = m.portal || {};
    var beacon = m.beacon || {};
    statsEl.appendChild(statCard('Portal invocations', Math.round(portal.totalInvocations || 0), '30 days'));
    statsEl.appendChild(statCard('Portal errors',      Math.round(portal.totalErrors || 0), '30 days'));
    statsEl.appendChild(statCard('Beacon invocations', Math.round(beacon.totalInvocations || 0), '30 days'));

    var wrap = document.getElementById('metrics-table-wrap');
    var rows = (portal.invocations || []);

    if (!rows.length) {
      wrap.innerHTML = '<div class="loading">No invocation data available.</div>';
      return;
    }

    var t = '<table class="data-table"><thead><tr>' +
      '<th>Date</th><th>Portal inv.</th><th>Portal err.</th><th>Beacon inv.</th>' +
      '</tr></thead><tbody>';

    var errMap = {};
    (portal.errors || []).forEach(function (d) { errMap[d.date] = d.value || 0; });
    var beaconMap = {};
    (beacon.invocations || []).forEach(function (d) { beaconMap[d.date] = d.value || 0; });

    rows.forEach(function (row) {
      var errs    = errMap[row.date] || 0;
      var bcount  = beaconMap[row.date] || 0;
      t += '<tr>' +
        '<td style="color:#888">' + fmtDate(row.date) + '</td>' +
        '<td style="color:#aaa">' + Math.round(row.value || 0) + '</td>' +
        '<td style="color:' + (errs > 0 ? '#9a5a5a' : '#555') + '">' + Math.round(errs) + '</td>' +
        '<td style="color:#777">' + Math.round(bcount) + '</td>' +
        '</tr>';
    });

    t += '</tbody></table>';
    wrap.innerHTML = t;
  }

  /** @param {object} c */
  function renderCosts(c) {
    var statsEl = document.getElementById('costs-stats');
    statsEl.innerHTML = '';
    statsEl.appendChild(statCard('MTD Total', '$' + (c.mtdTotal || 0).toFixed(2)));

    var trend = c.trend || [];
    if (trend.length > 1) {
      var prev = trend[trend.length - 2];
      statsEl.appendChild(statCard('Last full month', '$' + (prev.amount || 0).toFixed(2), prev.month));
    }

    var wrap  = document.getElementById('costs-bars-wrap');
    var svcs  = c.byService || [];
    var max   = svcs.length ? svcs[0].amount : 1;

    if (!svcs.length) {
      wrap.innerHTML = '<div class="loading">No cost data available (may take 24h for new accounts).</div>';
      return;
    }

    var html = '';
    svcs.forEach(function (s) {
      var pct = max > 0 ? (s.amount / max * 100) : 0;
      html += '<div class="cost-row">' +
        '<span class="svc">' + esc(s.service) + '</span>' +
        '<div class="cost-bar-track"><div class="cost-bar-fill" style="width:' + pct.toFixed(1) + '%"></div></div>' +
        '<span class="amt">$' + s.amount.toFixed(2) + '</span>' +
        '</div>';
    });

    html += '<div style="margin-top:20px;border-top:1px solid #1e1e1e;padding-top:16px">' +
      '<div class="section-title">Monthly Trend</div>';

    trend.forEach(function (m) {
      html += '<div style="display:flex;gap:12px;margin-bottom:6px">' +
        '<span style="color:#666;font-size:11px;min-width:80px">' + esc(m.month) + '</span>' +
        '<span style="color:#aaa;font-size:11px">$' + (m.amount || 0).toFixed(2) + '</span>' +
        '</div>';
    });

    html += '</div>';
    wrap.innerHTML = html;
  }

  // ---- Helpers ----

  function statCard(label, value, sub) {
    var el = document.createElement('div');
    el.className = 'stat-card';
    el.innerHTML = '<div class="label">' + esc(String(label)) + '</div>' +
      '<div class="value">' + esc(String(value)) + '</div>' +
      (sub ? '<div class="sub">' + esc(String(sub)) + '</div>' : '');
    return el;
  }

  function badgeFor(status) {
    var s = (status || 'unknown').toLowerCase();
    var cls = 'badge-unknown';
    if (s.indexOf('intake') > -1)   cls = 'badge-intake';
    else if (s === 'active')        cls = 'badge-active';
    else if (s.indexOf('pending') > -1) cls = 'badge-pending';
    else if (s.indexOf('recall') > -1)  cls = 'badge-recalled';
    return '<span class="badge ' + cls + '">' + esc(s) + '</span>';
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    if (isNaN(d)) return String(iso).slice(0, 10);
    return d.toISOString().slice(0, 10) + ' ' + d.toISOString().slice(11, 16);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderSitemap() {
    var grid = document.getElementById('sitemap-grid');
    var html = '';
    SITEMAP.forEach(function (section) {
      html += '<div class="sitemap-group">';
      html += '<div class="sitemap-group-title">' + esc(section.group) + '</div>';
      section.pages.forEach(function (page) {
        var href = SITE_ROOT + page.path;
        var tagHtml = '';
        if (page.tag) {
          tagHtml = ' <span class="sl-tag tag-' + page.tag + '">' + esc(page.tagLabel) + '</span>';
        }
        var noteHtml = page.note
          ? ' <span class="sl-note">' + esc(page.note) + '</span>'
          : '';
        if (page.pending) {
          html += '<span class="sitemap-link" style="opacity:0.45;cursor:default" title="not yet deployed">' +
            '<span class="sl-label">' + esc(page.label) + '</span>' +
            noteHtml +
            tagHtml +
            ' <span class="sl-tag tag-pending">pending</span>' +
            '</span>';
        } else {
          html += '<a class="sitemap-link" href="' + esc(href) + '" target="_blank" rel="noopener">' +
            '<span class="sl-label">' + esc(page.label) + '</span>' +
            noteHtml +
            tagHtml +
            '</a>';
        }
      });
      html += '</div>';
    });
    grid.innerHTML = html;
  }
